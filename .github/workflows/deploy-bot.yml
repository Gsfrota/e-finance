name: Deploy e-finance-bot

on:
  push:
    branches: [main]
    paths:
      - 'e-finance-bot/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

env:
  PROJECT_ID: tribal-pillar-476701-a3
  REGION: us-west1
  SERVICE: e-finance-bot
  REGISTRY: us-west1-docker.pkg.dev/tribal-pillar-476701-a3/cloud-run-source-deploy/e-finance-bot

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e-finance-bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e-finance-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run build

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push image
        working-directory: e-finance-bot
        run: |
          docker build -t ${{ env.REGISTRY }}:${{ github.sha }} -t ${{ env.REGISTRY }}:latest .
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60 \
            --set-secrets="UAZAPI_INSTANCE_TOKEN=UAZAPI_INSTANCE_TOKEN:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY_EFINANCE:latest,GEMINI_API_KEY=GEMINI_API_KEY_EFINANCE:latest,SCHEDULER_SECRET=SCHEDULER_SECRET:latest,SUPABASE_URL=SUPABASE_URL_EFINANCE:latest" \
            --set-env-vars="UAZAPI_SERVER_URL=https://processai.uazapi.com"

      - name: Get service URL and configure webhooks
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Bot URL: $URL"
          curl -s -X POST "$URL/setup" \
            -H "Content-Type: application/json" \
            -d "{\"webhookBaseUrl\": \"$URL\"}"
