name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - 'e-finance-bot/**'

env:
  PROJECT_ID: tribal-pillar-476701-a3
  REGION: us-west1
  SERVICE: e-finance
  IMAGE: us-west1-docker.pkg.dev/tribal-pillar-476701-a3/cloud-run-source-deploy/e-finance

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Docker image
        run: |
          docker build \
            --build-arg GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --port=8080
            --set-env-vars=API_KEY=${{ secrets.GEMINI_API_KEY }}
            --update-secrets=SUPABASE_KEY=SUPABASE_KEY_EFINANCE:1,SUPABASE_URL=SUPABASE_URL_EFINANCE:1

      - name: Show service URL
        run: |
          echo "✅ Deploy concluído!"
          echo "URL: $(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')"

      - name: Notificar sucesso no Telegram
        if: success()
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          MSG="✅ *Deploy concluído*%0A%0AServiço: \`${{ env.SERVICE }}\`%0ACommit: \`${{ github.sha }}\`%0APor: ${{ github.actor }}%0AURL: ${URL}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=7354814208&text=${MSG}&parse_mode=Markdown" > /dev/null

      - name: Notificar falha no Telegram
        if: failure()
        run: |
          MSG="❌ *Deploy falhou*%0A%0AServiço: \`${{ env.SERVICE }}\`%0ACommit: \`${{ github.sha }}\`%0APor: ${{ github.actor }}%0A%0A🔍 Detalhes: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=7354814208&text=${MSG}&parse_mode=Markdown" > /dev/null
