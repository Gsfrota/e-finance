name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Você é um revisor de código especialista em TypeScript, React e Supabase.

            Revise este PR com foco em:
            1. **Corretude**: Lógica de negócio correta, cálculos financeiros precisos (verificar fórmulas de juros, % pagamento, atrasados)
            2. **Regras de Negócio**: Verificar conformidade com as BRs em `docs/business-rules/e-finance-br.md` (especialmente BR-REL-002 parcelas fantasma, BR-REL-003 timezone São Paulo)
            3. **TypeScript**: Tipos corretos, sem `any` desnecessário, interfaces bem definidas
            4. **Performance**: Sem re-fetches desnecessários, uso correto do cache
            5. **Acessibilidade**: aria-labels, contraste de cores
            6. **Segurança**: Nenhum dado sensível exposto, RLS respeitado

            Responda em português (PT-BR). Seja objetivo e aponte problemas específicos com número de linha quando relevante.
            Classifique cada problema como: 🔴 CRÍTICO | 🟡 ATENÇÃO | 🟢 SUGESTÃO
