server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para API do Gemini (necessário pelo service worker legado do AI Studio)
    location /api-proxy/ {
        rewrite ^/api-proxy/(.*)$ /$1 break;
        proxy_pass https://generativelanguage.googleapis.com;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }

    # index.html: nunca cachear — garante que novo deploy seja sempre servido
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Assets com hash (JS/CSS): cache longo — Vite muda o nome quando o conteúdo muda
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
